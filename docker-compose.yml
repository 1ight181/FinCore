version: "3.9"

services:
  web:
    build: .
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.main
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/usr/src/app:cached

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB__USER:-postgres}
      POSTGRES_PASSWORD: ${DB__PASSWORD:-password}
      POSTGRES_DB: ${DB__DATABASE_NAME:-fincore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
